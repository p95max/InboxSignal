services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
      DJANGO_DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

volumes:
  postgres_data: