{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Messaging Monitoring{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'css/core.css' %}">
    <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/controls.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}">
    <link rel="stylesheet" href="{% static 'css/events.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/profile_cards.css' %}">

</head>
<body>

{% include "includes/_navbar.html" %}

<main class="layout">
    {% block content %}{% endblock %}
</main>

{% include "includes/_account_settings_modal.html" %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const openButtons = document.querySelectorAll("[data-modal-open]");
        const closeButtons = document.querySelectorAll("[data-modal-close]");

        function openModal(modalId) {
            const modal = document.getElementById(modalId);

            if (!modal) {
                return;
            }

            modal.classList.add("is-open");
            modal.setAttribute("aria-hidden", "false");
            document.body.classList.add("modal-open");
        }

        function closeModal(modal) {
            modal.classList.remove("is-open");
            modal.setAttribute("aria-hidden", "true");
            document.body.classList.remove("modal-open");
        }

        openButtons.forEach(function (button) {
            button.addEventListener("click", function () {
                openModal(button.dataset.modalOpen);
            });
        });

        closeButtons.forEach(function (button) {
            button.addEventListener("click", function () {
                const modal = button.closest(".modal");

                if (modal) {
                    closeModal(modal);
                }
            });
        });

        document.addEventListener("keydown", function (event) {
            if (event.key !== "Escape") {
                return;
            }

            document.querySelectorAll(".modal.is-open").forEach(closeModal);
        });

        document.querySelectorAll("[data-delete-account-form]").forEach(function (form) {
            form.addEventListener("submit", function (event) {
                const message = form.dataset.confirmMessage || "Delete account permanently?";

                if (!window.confirm(message)) {
                    event.preventDefault();
                }
            });
        });
    });
</script>

</body>
</html>
