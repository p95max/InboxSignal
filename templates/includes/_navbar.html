<header class="topbar">
    <div class="topbar-inner">
        <a class="brand brand-modern" href="{% url 'home' %}" aria-label="InboxSignal home">
            <span class="brand-mark">IS</span>
            <span class="brand-text">
                <span class="brand-title">InboxSignal</span>
                <span class="brand-subtitle">Message triage & alerts</span>
            </span>
        </a>

        <nav class="nav-actions nav-actions-modern" aria-label="Main navigation">
            {% if request.user.is_authenticated %}
                <a class="nav-link-modern" href="{% url 'home' %}">
                    Home
                </a>

                <a class="button button-primary nav-dashboard-button" href="{% url 'dashboard' %}">
                    Dashboard
                </a>

                <div class="user-chip" title="{{ request.user.email }}">
                    <button
                        class="nav-user-link"
                        type="button"
                        data-modal-open="accountSettingsModal"
                    >
                        {{ request.user.email }}
                    </button>
                </div>

                <form class="logout-form" method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="button button-ghost" type="submit">
                        Logout
                    </button>
                </form>
            {% else %}

                <a class="nav-link-modern" href="{% url 'login' %}">
                    Login
                </a>

                <a class="button button-primary" href="{% url 'signup' %}">Get started</a>
            {% endif %}
        </nav>
    </div>
</header>
