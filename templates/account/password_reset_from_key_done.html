{% extends "base.html" %}

{% block title %}Password changed | Messaging Monitoring{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="page-header auth-page-header">
        <h1>Password changed</h1>
        <p>Your password has been updated successfully.</p>
    </div>

    <section class="card auth-card">
        <h2>You can log in now</h2>

        <p class="muted">
            Use your email address and the new password to access your account.
        </p>

        <a class="button button-primary auth-button-full" href="{% url 'account_login' %}">
            Back to login
        </a>
    </section>
</div>
{% endblock %}
