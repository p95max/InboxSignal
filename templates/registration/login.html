{% extends "base.html" %}

{% block title %}Login | Messaging Monitoring{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Login</h1>
    <p>Use your account email and password.</p>
</div>

<div class="card" style="max-width: 420px;">
    {% if form.errors %}
        <div class="card" style="background: #fdeaea; color: #c62828; margin-bottom: 16px;">
            Invalid email or password.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="field" style="margin-bottom: 14px;">
            <label for="{{ form.username.id_for_label }}">Email</label>
            {{ form.username }}
        </div>

        <div class="field" style="margin-bottom: 18px;">
            <label for="{{ form.password.id_for_label }}">Password</label>
            {{ form.password }}
        </div>

        <button class="button-primary" type="submit">Login</button>
    </form>
</div>
{% endblock %}
