services:
  web:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      RUN_MIGRATIONS: "1"
      DJANGO_DEBUG: "True"
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_worker:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      RUN_MIGRATIONS: "0"
      DJANGO_DEBUG: "True"
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_beat:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      RUN_MIGRATIONS: "0"
      DJANGO_DEBUG: "True"
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: